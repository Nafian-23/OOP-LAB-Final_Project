<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.1); padding: 48px 40px; text-align: center; max-width: 420px; width: 100%; }
  h1 { font-size: 2rem; color: #e63946; margin-bottom: 8px; }
  p  { color: #666; margin-bottom: 36px; }
  .btn { display: block; width: 100%; padding: 14px; border-radius: 8px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 14px; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .btn-primary  { background: #e63946; color: #fff; }
  .btn-secondary{ background: #457b9d; color: #fff; }
</style>
</head>
<body>
<div class="card">
  <h1>🍔 Food Delivery</h1>
  <p>Welcome! Choose your portal to get started.</p>
  <a href="customer.html" class="btn btn-primary">🛒 Customer Portal</a>
  <a href="restaurant.html" class="btn btn-secondary">🍽️ Restaurant Portal</a>
  <a href="admin.html" class="btn" style="background:#2d2d2d;color:#e63946;border:1px solid #e63946">⚙️ Admin Portal</a>
</div>
</body>
</html>
